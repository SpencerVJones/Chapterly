name: Android CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  unit-lint-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Chapterly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permissions
        run: chmod +x ./gradlew

      - name: Quality Gates + Build
        run: ./gradlew detekt ktlintCheck lint testDebugUnitTest jacocoTestCoverageVerification assembleDebug

  instrumented-tests:
    runs-on: ubuntu-latest
    needs: unit-lint-build

    defaults:
      run:
        working-directory: Chapterly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permissions
        run: chmod +x ./gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          script: cd Chapterly && ./gradlew connectedDebugAndroidTest
