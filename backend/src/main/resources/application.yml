spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chapterly}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

firebase:
  auth:
    debug-header-enabled: ${FIREBASE_DEBUG_HEADER_ENABLED:true}
    debug-email-domain: ${FIREBASE_DEBUG_EMAIL_DOMAIN:debug.local}
