spring:
  datasource:
    url: jdbc:h2:mem:google_books_backend;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

firebase:
  auth:
    debug-header-enabled: true
    debug-email-domain: test.local
